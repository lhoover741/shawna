<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | Ravishing Beautè</title>
  <meta name="description" content="Luxury braids, installs, ponytails, and polished beauty services with Ravishing Beautè." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/jpeg" href="assets/images/IMG_3482.jpeg" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/gallery-luxury.css" />
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="assets/images/IMG_3482.jpeg" alt="Ravishing Beautè logo" />
        <div class="brand-text">
          <span class="brand-kicker">Northwest Indiana</span>
          <span class="brand-name">Ravishing Beautè</span>
        </div>
      </a>

      <button class="nav-toggle" type="button">Menu</button>

      <nav class="site-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a class="active" href="gallery.html">Gallery</a></li>
          <li><a href="booking.html">Booking</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="policies.html">Policies</a></li>
          <li><a class="cta-link" href="booking.html">Book Now</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="page-shell">

    <section class="page-hero">
      <div class="container page-hero-shell">
        <div>
          <span class="eyebrow">Gallery</span>
          <h1>Recent work and signature finishes.</h1>
          <p>Browse a curated mix of recent styles, detailed braids, and polished final looks.</p>
        </div>
        <div class="page-hero-image">
          <img src="assets/images/hero-main.jpg" alt="Featured Ravishing Beautè style" />
        </div>
      </div>
    </section>

    <section>
      <div class="container">

        <div class="gallery-grid">

          <!-- KEEP YOUR IMAGES (UNCHANGED) -->

        </div>

      </div>
    </section>

  </main>

  <!-- LIGHTBOX -->
  <div class="gallery-lightbox" id="lightbox">
    <img id="lightbox-img">
  </div>

  <script>
  document.querySelectorAll('.gallery-item img').forEach(img=>{
    img.addEventListener('click',()=>{
      document.getElementById('lightbox').style.display='flex';
      document.getElementById('lightbox-img').src=img.src;
    });
  });
  document.getElementById('lightbox').addEventListener('click',()=>{
    document.getElementById('lightbox').style.display='none';
  });
  </script>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <div class="brand">
          <img src="assets/images/IMG_3482.jpeg">
          <div class="brand-text">
            <span class="brand-kicker">Luxury beauty services</span>
            <span class="brand-name">Ravishing Beautè</span>
          </div>
        </div>
      </div>
    </div>
  </footer>

</body>
</html>
